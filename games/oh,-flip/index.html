<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OH FLIP - Quick play now - CLASSROOM16X.VERCEL.APP</title>

    <style>
        /* Estilos de la página principal */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0d0d11;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Contenedor del iframe para que ocupe toda la pantalla */
        #game-container {
            width: 100%;
            height: 100%;
            display: block;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* BOTÓN FLOTANTE DEL MOD MENU */
        #mod-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 14px 28px;
            background: linear-gradient(45deg, #ff0055, #00ffcc);
            color: black;
            font-weight: bold;
            font-size: 16px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.6);
            z-index: 9999;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        #mod-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.8);
            color: white;
        }

        /* PANEL DEL MOD MENU */
        #mod-menu {
            position: fixed;
            top: 85px;
            left: 20px;
            width: 320px;
            background: rgba(10, 10, 15, 0.95);
            border: 3px solid #00ffcc;
            border-radius: 15px;
            padding: 20px;
            color: #00ffcc;
            display: none; /* Oculto por defecto */
            z-index: 9999;
            box-shadow: 0 0 35px rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
        }

        #mod-menu h2 {
            margin-top: 0;
            color: #ff0055;
            text-align: center;
            font-size: 26px;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.6);
            border-bottom: 2px dashed #00ffcc;
            padding-bottom: 10px;
        }

        .mod-group {
            margin-bottom: 18px;
        }

        .mod-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #ff0055;
            font-weight: bold;
        }

        .mod-btn-action {
            width: 100%;
            padding: 12px;
            background: #1a1a24;
            border: 2px solid #00ffcc;
            color: #00ffcc;
            font-weight: bold;
            font-size: 13px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .mod-btn-action:hover {
            background: #00ffcc;
            color: black;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }

        .mod-input {
            width: calc(100% - 24px);
            padding: 10px;
            background: #111;
            border: 1px solid #ff0055;
            color: #fff;
            border-radius: 6px;
            margin-bottom: 8px;
            font-weight: bold;
            text-align: center;
        }
        
        .danger-btn {
            border-color: #ff0055 !important;
            color: #ff0055 !important;
        }
        .danger-btn:hover {
            background: #ff0055 !important;
            color: white !important;
        }
    </style>
</head>

<body>

    <button id="mod-btn" onclick="toggleMenu()">👾 MOD MENU 👾</button>

    <div id="mod-menu">
        <h2>HACK PANEL</h2>
        
        <div class="mod-group">
            <button class="mod-btn-action" onclick="hackCompleteGoal()">⏩ Saltar/Completar Misión</button>
        </div>

        <div class="mod-group">
            <label>Teletransporte de Altura (ft):</label>
            <input type="number" id="input-height" class="mod-input" value="1000">
            <button class="mod-btn-action" onclick="hackHeight()">Aplicar Altura</button>
        </div>

        <div class="mod-group">
            <label>Contador de Flips Totales:</label>
            <input type="number" id="input-flips" class="mod-input" value="1337">
            <button class="mod-btn-action" onclick="hackFlips()">Modificar Flips</button>
        </div>

        <div class="mod-group">
            <button class="mod-btn-action danger-btn" onclick="hackSuperJump()">🚀 Activar Súper Salto</button>
        </div>

        <div class="mod-group">
            <button class="mod-btn-action" onclick="hackAntiCrash()">🛡️ Activar Vida Infinita</button>
        </div>

        <div class="mod-group">
            <button class="mod-btn-action danger-btn" onclick="hackReset()">🧹 Resetear TODO a 0</button>
        </div>
    </div>

    <div id="game-container">
        <iframe id="game-iframe"></iframe>
    </div>

        // Inyectamos el juego en el iframe de forma dinámica
        const iframe = document.getElementById('game-iframe');
        const doc = iframe.contentWindow.document;
        doc.open();
        doc.write(originalGameHTML);
        doc.close();

        // Control de Estado de Vida Infinita
        window.godModeActive = false;

        function getGame() {
            return iframe.contentWindow;
        }

        function toggleMenu() {
            const menu = document.getElementById('mod-menu');
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        }

        function hackCompleteGoal() {
            const game = getGame();
            if (game && typeof game.O !== 'undefined') {
                game.O++; 
                game.localStorage.setItem("ohflip.goalIdx", game.O);
                game.U(game.b.width / 2, 200, "HACK: GOAL SKIPPED!", "#00ffcc", true);
            }
        }

        function hackHeight() {
            const game = getGame();
            const inputVal = parseInt(document.getElementById('input-height').value);
            if (game && !isNaN(inputVal)) {
                game.k = inputVal * 40; 
                game.E = Math.max(game.k, game.E); 
                game.U(game.b.width / 2, game.b.height - 300, "HEIGHT INJECTED!", "#ff0055");
            }
        }

        function hackFlips() {
            const game = getGame();
            const inputVal = parseInt(document.getElementById('input-flips').value);
            if (game && !isNaN(inputVal)) {
                game.x = inputVal;  
                game.z = inputVal;  
                game.B = inputVal;  
                game.C = inputVal;  
                game.localStorage.setItem("ohflip.maxTotalFlips", inputVal);
                game.U(game.b.width / 2, game.b.height - 300, `FLIPS ALTERED TO ${inputVal}!`, "#FFFF00", true);
            }
        }

        function hackSuperJump() {
            const game = getGame();
            if (game) {
                game.p = 9000; 
                game.l = 9000; 
                game.U(game.b.width / 2, game.b.height - 300, "SUPER JUMP ENGAGED!", "#00ffcc", true);
            }
        }

        function hackAntiCrash() {
            const game = getGame();
            if (game) {
                if (!window.godModeActive) {
                    window.godModeActive = true;
                    setInterval(() => {
                        const g = getGame();
                        if (g) {
                            if (g.v) {
                                g.v = false;
                                g.w = 0;
                                g.m = 0;   
                                g.k = 120; 
                                g.l = 1200; 
                            }
                            if (g.k <= 35 && Math.abs(g.m) > 30) {
                                g.m = 0; 
                            }
                        }
                    }, 8);
                    game.U(game.b.width / 2, game.b.height - 300, "GOD MODE: ALWAYS ACTIVE!", "#00FF46", true);
                } else {
                    game.U(game.b.width / 2, game.b.height - 300, "GOD MODE ALREADY ACTIVE!", "#00FF46");
                }
            }
        }

        function hackReset() {
            const game = getGame();
            if (game) {
                game.localStorage.setItem("ohflip.goalIdx", 0);
                game.localStorage.setItem("ohflip.maxHeightFt", 0);
                game.localStorage.setItem("ohflip.maxTotalFlips", 0);
                game.O = 0;
                game.pa();
                document.getElementById('input-height').value = 1000;
                document.getElementById('input-flips').value = 1337;
                game.U(game.b.width / 2, game.b.height - 300, "ALL MEMORY & STORAGE RESETED!", "#ff0055", true);
            }
        }
    </script>
</body>
</html>
