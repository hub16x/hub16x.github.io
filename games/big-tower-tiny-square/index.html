<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIG TOWER TINY SQUARE - Quick play now - CLASSROOM16X.VERCEL.APP</title>
    <meta name="description"
        content="Dodge lava and bullets in Big Tower Tiny Square! Climb a huge tower to save your pineapple. Play this tough precision platformer for free now!">
    <style>
        /* --- ESTILOS DE LA PANTALLA DE CARGA --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117;
            /* Fondo profundo */
            color: #ffffff;
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0d1117;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999; /* Se mantiene siempre arriba tapando todo */
            transition: opacity 0.4s ease-out;
            /* Desvanecimiento orgánico */
        }

        .spinner {
            width: 90px;
            height: 90px;
            border: 10px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            border-top: 10px solid #2563eb;
            /* Azul brillante */
            border-right: 10px solid #059669;
            /* Verde esmeralda */
            animation: spin 1.1s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 15px rgba(37, 99, 235, 0.4));
        }

        .loading-text {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 2.5px;
            margin-bottom: 15px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #2563eb, #10b981);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulseText 1.5s ease-in-out infinite;
        }


        /* Estilo elegante para el texto personalizado de tu juego */
        .custom-subtext {
            font-size: 1.1rem;
            color: #9ca3af;
            margin-bottom: 8px;
            font-weight: 400;
            letter-spacing: 1px;
            text-align: center;
        }

        #percentage {
            font-size: 1.5rem;
            color: #10b981;
            /* Verde dinámico para el número */
            font-variant-numeric: tabular-nums;
            font-weight: 700;
            margin-top: 5px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes pulseText {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        /* --- CONTENEDOR DEL IFRAME (ACTIVO DE FONDO) --- */
        #iframe-container {
            width: 100%;
            height: 100%;
            position: absolute; /* Permite que se coloque detrás */
            top: 0;
            left: 0;
            z-index: 1; /* Nivel bajo para que la carga lo tape */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>

<body>

    <!-- Pantalla de carga que tapa todo -->
    <div id="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">LOADING</div>
        <div class="custom-subtext">Loading <em>BIG TOWER TINY SQUARE</em>...</div>
        <div id="percentage">0%</div>
    </div>

    <!-- El contenedor ya no tiene "display: none", el juego carga de inmediato -->
    <div id="iframe-container">
        <iframe allow="autoplay; fullscreen; gamepad" src="https://ubg98.github.io/BigTowerTinySquare"></iframe>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const loadingScreen = document.getElementById('loading-screen');
            const percentageText = document.getElementById('percentage');

            // ⏱️ DURACIÓN EXACTA: 4.5 Segundos (4500ms)
            const TOTAL_TIME = 4500;

            // --- LÓGICA DE CARGA IRREGULAR EXTENDIDA A 4.5s ---
            const progressStages = [
                { percent: 0, timeFactor: 0 },         
                { percent: 14, timeFactor: 0.08 },     
                { percent: 19, timeFactor: 0.18 },     
                { percent: 55, timeFactor: 0.32 },     
                { percent: 58, timeFactor: 0.60 },     // ¡PARÓN ULTRA REALISTA!
                { percent: 82, timeFactor: 0.78 },     
                { percent: 96, timeFactor: 0.93 },     
                { percent: 100, timeFactor: 1.0 }      
            ];

            let currentStageIndex = 0;
            let startTime = performance.now();

            function updateFakeProgress() {
                const currentTime = performance.now() - startTime;

                if (currentTime >= TOTAL_TIME) {
                    percentageText.innerHTML = `100%`;
                    showIframe();
                    return;
                }

                while (currentStageIndex < progressStages.length - 1 && currentTime > progressStages[currentStageIndex + 1].timeFactor * TOTAL_TIME) {
                    currentStageIndex++;
                }

                if (currentStageIndex < progressStages.length - 1) {
                    const currentStage = progressStages[currentStageIndex];
                    const nextStage = progressStages[currentStageIndex + 1];

                    const stageDuration = (nextStage.timeFactor - currentStage.timeFactor) * TOTAL_TIME;
                    const timeInStage = currentTime - (currentStage.timeFactor * TOTAL_TIME);

                    let stageProgress = timeInStage / stageDuration;

                    const noise = (Math.random() - 0.5) * 0.015;
                    stageProgress = Math.max(0, Math.min(1, stageProgress + noise));

                    const currentPercent = Math.floor(currentStage.percent + (stageProgress * (nextStage.percent - currentStage.percent)));

                    percentageText.innerHTML = `${Math.min(99, currentPercent)}%`;

                    requestAnimationFrame(updateFakeProgress);
                }
            }

            // --- FUNCIÓN DE DESPLIEGUE DEL JUEGO ---
            function showIframe() {
                setTimeout(() => {
                    // Quitamos la pantalla de carga con desvanecimiento
                    loadingScreen.style.opacity = '0';
                    setTimeout(() => {
                        loadingScreen.style.display = 'none';
                    }, 400); // Borra el elemento tras la animación CSS
                }, 150); // Pausa final con el 100% a la vista
            }

            requestAnimationFrame(updateFakeProgress);
        });
    </script>
</body>

</html>
