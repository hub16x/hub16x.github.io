<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>Hub 16x - Log in to play</title>

    <style>
        :root {
            --theme-color: #0f1aab;
            --xp-color: #0958b3;
            --bg-color: #ffffff;
            --text-color: #333333;
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background-color: #eff2f5;
            border-bottom: 1px solid #e4e6ef;
        }

        header a {
            display: inline-block;
        }

        header img {
            height: 40px;
            vertical-align: middle;
        }

        .iframe-container {
            flex: 1;
            width: 100%;
            background-color: #000;
        }

        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>

<body>

    <header>
        <a href="/">
            <img src="/assets/logo/logo.png" alt="HUB 16X - UNBLOCKED UNBANNED GAMES - PLAY NOW, ANYWHERE, JUST PLAY.">
        </a>
    </header>
    <div class="iframe-container">
        <iframe src="https://web.cloudmoonapp.com/" allow="fullscreen; autoplay; clipboard-write"
            sandbox="allow-scripts allow-forms allow-same-origin allow-popups" scrolling="yes"></iframe>
    </div>
</body>

</html>
