<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>Hub 16x - Log in to play</title>
    
    <style>
        :root {
            --theme-color: #0f1aab;
            --xp-color: #0958b3;
            --bg-color: #ffffff;
            --text-color: #333333;
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh; /* Ocupa toda la altura de la ventana */
            overflow: hidden; /* Evita barras de desplazamiento dobles */
        }

        /* --- ESTILOS DEL ENCABEZADO Y LOGO --- */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background-color: #eff2f5;
            border-bottom: 1px solid #e4e6ef;
        }

        header a {
            display: inline-block;
        }

        header img {
            height: 40px;
            vertical-align: middle;
        }

        /* --- ESTILOS DEL IFRAME --- */
        .iframe-container {
            flex: 1; /* Ocupa el espacio restante debajo del header */
            width: 100%;
            background-color: #000;
        }

        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* --- ESTILOS DEL MENÚ DE CAMUFLAJE (Alt + Z) --- */
        .cloak-modal {
            display: none;
            position: fixed;
            z-index: 99999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
        }

        .cloak-content {
            background-color: #ffffff;
            margin: 10% auto;
            padding: 25px;
            border-radius: 1.2rem;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 2px solid var(--theme-color);
            max-height: 85vh;
            overflow-y: auto;
        }

        .cloak-header {
            font-weight: bold;
            font-size: 1.3rem;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cloak-close {
            cursor: pointer;
            font-size: 1.5rem;
            color: #999;
        }

        .cloak-close:hover {
            color: #f44336;
        }

        .cloak-field {
            margin-bottom: 15px;
        }

        .cloak-field label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }

        .cloak-select,
        .cloak-input {
            width: 100%;
            padding: 10px;
            border-radius: 0.5rem;
            border: 1px solid #ccc;
            font-family: inherit;
        }

        .cloak-btn-save {
            background-color: var(--theme-color);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 0.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .cloak-btn-save:hover {
            background-color: var(--xp-color);
        }
    </style>
</head>

<body>

    <!-- Barra Superior con tu Logo y Enlace -->
    <header>
        <!-- PON AQUÍ TU ENLACE Y TU LOGO -->
        <a href="https://hub16x.vercel.app">
            <img src="/assets/logo/logo.png" alt="HUB 16X - UNBLOCKED UNBANNED GAMES - PLAY NOW, ANYWHERE, JUST PLAY.">
        </a>
        <span style="font-size: 0.85rem; color: #7e8299;">Press <strong>Alt+Z</strong> to edit tab settings.</span>
    </header>

    <!-- Iframe Central -->
    <div class="iframe-container">
        <!-- PON AQUÍ LA URL DE TU PÁGINA -->
        <iframe src="https://web.cloudmoonapp.com/" allow="fullscreen; autoplay; clipboard-write" sandbox="allow-scripts allow-forms allow-same-origin allow-popups" scrolling="yes"></iframe>
    </div>
</body>
</html>
